# SonarQube project identity
sonar.projectKey=videbarras-nov
sonar.projectName=Videbarras NOV
sonar.projectVersion=1.0

# Source code
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Optional: keep non-source folders out of analysis
sonar.exclusions=dist/**,node_modules/**,coverage/**

# TypeScript/JavaScript test and coverage patterns (if you add tests later)
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# If you self-host SonarQube, set URL at runtime or in CI env vars
# sonar.host.url=http://localhost:9000
